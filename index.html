<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema de Relatório dos Clientes Texugers</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

@page{margin:18mm}

body{
font-family:'Roboto',sans-serif;
background:#eef1f6;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

button{
background:#4a6cf7;
color:white;
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.header{
display:grid;
grid-template-columns:120px 1fr 120px;
align-items:center;
margin-bottom:40px;
}

.logo{
width:120px;
height:120px;
object-fit:contain;
}

.title{
text-align:center;
font-size:30px;
font-weight:800;
}

.client-info{
text-align:center;
margin-top:10px;
}

#clientName{
font-size:26px;
font-weight:700;
}

.metrics{
display:flex;
flex-direction:column;
gap:20px;
}

.section-title{
font-size:22px;
font-weight:800;
margin-top:40px;
text-align:center;
padding-bottom:6px;
border-bottom:2px solid #e5e7eb;
}

.metric-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.metric-card{
background:white;
border-radius:14px;
padding:16px;
border:1px solid #ececec;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.metric-title{
font-weight:600;
margin-bottom:6px;
}

.metric-main{
display:flex;
justify-content:space-between;
align-items:center;
}

.metric-value{
font-size:26px;
font-weight:800;
}

.metric-growth{
font-size:16px;
font-weight:700;
}

.metric-previous{
font-size:13px;
color:#666;
margin-top:5px;
}

.positive{color:#18a957}
.negative{color:#e03131}
.neutral{color:#000}

.inputs{margin-top:8px}

input,select{
width:100%;
padding:6px;
margin-top:4px;
}

textarea{
width:100%;
height:140px;
padding:10px;
font-family:'Roboto',sans-serif;
}

.remove{
background:#e03131;
margin-top:6px;
}

.section{
margin-top:50px;
}

.ranking{
background:white;
border-radius:14px;
padding:20px;
border:1px solid #ececec;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
margin-top:20px;
}

.chart-container{
height:320px;
margin-top:20px;
}

canvas{
  background:white;
  border-radius:10px;
  padding:10px;
}

@media print{

#cover{
  display:block !important;
  page-break-after: always;
}

body{
  background:white;
  padding:0;
}

.container{
  max-width:100%;
}

.topbar,
.inputs,
.remove,
button,
input,
select,
textarea,
.channel {
  display:none !important;
}

.metric-card{
  page-break-inside: avoid;
}

.section{
  page-break-before: always;
}

.chart-container{
  height:280px;
}

h2{
  margin-top:40px;
}

.section-title{
  margin-top:30px;
}

}
</style>

</head>

<body>

<div class="container">

<div id="cover" style="display:none;">

  <h1 style="text-align:center; font-size:40px; margin-top:200px;">
    Relatório de Performance
  </h1>

  <p style="text-align:center; font-size:20px; margin-top:20px;">
    <span id="coverClient"></span><br>
    <span id="coverPeriod"></span>
  </p>

</div>

<div class="topbar">

<button onclick="exportPDF()">Exportar PDF</button>
<button onclick="saveReport()">Salvar Relatório</button>
<button onclick="generateNewReport()">Gerar Novo Relatório</button>
<button onclick="deleteReport()">Excluir Relatório</button>
<button onclick="deleteClient()">Excluir Cliente</button>

<button onclick="exportBackup()">Exportar Backup</button>
<input type="file" id="importFile" onchange="importBackup(event)">

<select id="clientSelect" onchange="updatePeriodList()">
<option value="">Selecionar Cliente</option>
</select>

<select id="periodSelect">
<option value="">Selecionar Período</option>
</select>

<button onclick="loadReport()">Carregar</button>

</div>

<div class="header">

<div>
<input type="file" id="logoAgencyInput">
<img id="logoAgency" class="logo">
</div>

<div>

<div contenteditable="true" class="title">
RELATÓRIO DE PERFORMANCE
</div>

<div class="client-info">

<strong contenteditable="true" id="clientName">
Nome do Cliente
</strong>

<br>

<span contenteditable="true" id="period">
Período do Relatório
</span>

</div>

</div>

<div>
<input type="file" id="logoClientInput">
<img id="logoClient" class="logo">
</div>

</div>

<div id="metrics"></div>

<br>

<div class="section">

<div class="section" id="chartsByPlatform">
  <h2>Comparativo por Plataforma</h2>
</div>


<div class="section">
<h2>Ranking de Crescimento</h2>
<div class="ranking" id="ranking"></div>
</div>

<div class="section">

<h2>Resumo do Período</h2>
<div class="ranking" id="summary"></div>

<h2>Observações Estratégicas</h2>
<textarea id="obs"></textarea>
</div>

</div>

<script>

let container=document.getElementById("metrics")
let metricOrder = 0
const channels = ["Meta Ads","Google Ads","Instagram","Facebook","Outros"]

function createSections(){

container.innerHTML = ""

}

function ensureSectionExists(channel){

let gridId = "grid_"+channel.replace(/\s/g,'')

if(document.getElementById(gridId)) return

let section = document.createElement("div")

section.innerHTML = `
  <div class="section-title">${channel}</div>

  <div class="metric-grid" id="${gridId}"></div>

  <div style="margin-top:15px;">
    <button onclick="addMetric({channel: '${channel}'})">
      + Adicionar Métrica
    </button>
  </div>
`
container.appendChild(section)

}

function addMetric(data={}){

let card=document.createElement("div")
card.className="metric-card"

card.innerHTML=`

<div contenteditable="true" class="metric-title">${data.title||"Nova Métrica"}</div>

<select class="channel">
  <option value="Meta Ads">Meta Ads</option>
  <option value="Google Ads">Google Ads</option>
  <option value="Instagram">Instagram</option>
  <option value="Facebook">Facebook</option>
  <option value="Outros">Outros</option>
</select>

<div class="metric-main">
<div class="metric-value">0</div>
<div class="metric-growth neutral">0%</div>
</div>

<div class="metric-previous">0 no período anterior</div>

<div class="inputs">

<select class="type">
<option value="number">Número</option>
<option value="currency">Moeda</option>
<option value="percent">Porcentagem</option>
</select>

<input class="atual" placeholder="Valor atual">
<input class="anterior" placeholder="Valor anterior">

<select class="rule">
<option value="higher">Maior é melhor</option>
<option value="lower">Menor é melhor</option>
</select>

</div>

<button class="remove">Remover</button>
`

let ch = data.channel

if(!ch){
  let lastGrid = document.querySelector(".metric-grid:last-of-type")
  
  if(lastGrid){
    ch = lastGrid.id.replace("grid_","")
  } else {
    ch = "Meta Ads"
  }
}

ensureSectionExists(ch)

let grid = document.getElementById("grid_"+ch.replace(/\s/g,""))

if(grid){
  grid.appendChild(card)
}

card.querySelector(".type").value=data.type||"number"
card.querySelector(".rule").value=data.rule||"higher"
if(data.channel) card.querySelector(".channel").value=data.channel
if(data.order !== undefined){
card.dataset.order = data.order
} else {
card.dataset.order = metricOrder++
}
if(data.atual) card.querySelector(".atual").value=data.atual
if(data.anterior) card.querySelector(".anterior").value=data.anterior

connectCard(card)
calculate(card)
updateSummary()

setTimeout(()=>{
  card.querySelector(".metric-title").focus()
},50)

}

function connectCard(card){

card.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",()=>{
calculate(card)
})
})

card.querySelectorAll("select").forEach(el=>{
el.addEventListener("change",()=>{
calculate(card)
})
})

let channelSelect = card.querySelector(".channel")

let originalValue = channelSelect.value

channelSelect.addEventListener("focus",()=>{
  originalValue = channelSelect.value
})

channelSelect.addEventListener("keydown",(e)=>{
  if(e.key === "Tab"){

    let newValue = channelSelect.value

    if(newValue !== originalValue){

      ensureSectionExists(newValue)

      let grid = document.getElementById("grid_"+newValue.replace(/\s/g,""))

      if(grid){
        grid.appendChild(card)

    cleanEmptySections()

        setTimeout(()=>{
          channelSelect.focus()
        },10)
      }

    }

  }
})


card.querySelector(".remove").onclick=()=>{
  card.remove()
  cleanEmptySections()
  updateCharts()
  updateRanking()
  updateSummary()
}

}


function parseBrazilNumber(v){
if(!v)return 0
v=v.replace(/\./g,"").replace(",",".")
return parseFloat(v)||0
}

function formatValue(v,t){
if(t=="currency") return "R$ "+v.toLocaleString("pt-BR",{minimumFractionDigits:2})
if(t=="percent") return v.toLocaleString("pt-BR",{minimumFractionDigits:2})+"%"
return v.toLocaleString("pt-BR")
}

function calculate(card){

let atual=parseBrazilNumber(card.querySelector(".atual").value)
let anterior=parseBrazilNumber(card.querySelector(".anterior").value)
let type=card.querySelector(".type").value
let rule=card.querySelector(".rule").value

card.querySelector(".metric-value").innerText=formatValue(atual,type)
card.querySelector(".metric-previous").innerText=formatValue(anterior,type)+" no período anterior"

let growth=card.querySelector(".metric-growth")

if(anterior==0){
growth.innerText="0%"
growth.className="metric-growth neutral"
}else{
let change=((atual-anterior)/anterior)*100
growth.innerText=change.toFixed(1)+"%"
let positive=rule=="higher"?change>=0:change<=0
growth.className="metric-growth "+(positive?"positive":"negative")
}

updateCharts()
updateRanking()
updateSummary()

}

function getMetrics(){

let metrics=[]

document.querySelectorAll(".metric-card").forEach(card=>{

metrics.push({

title:card.querySelector(".metric-title").innerText,
type:card.querySelector(".type").value,
rule:card.querySelector(".rule").value,
channel:(card.querySelector(".channel")?.value || "Outros"),
atual:card.querySelector(".atual").value,
anterior:card.querySelector(".anterior").value,
order: card.dataset.order
})

})

return metrics

}

function cleanEmptySections(){

  document.querySelectorAll(".metric-grid").forEach(grid=>{

    if(grid.children.length === 0){

      let section = grid.parentElement
      section.remove()

    }

  })

}

function updateCharts(){

let metrics = getMetrics()

let grouped = {
  "Meta Ads": [],
  "Google Ads": [],
  "Instagram": [],
  "Facebook": [],
  "Outros": []
}

metrics.forEach(m=>{
  let ch = m.channel || "Outros"
  if(!grouped[ch]) grouped[ch] = []
  grouped[ch].push(m)
})

let container = document.getElementById("chartsByPlatform")

if(!container) return

container.innerHTML = "<h2>Comparativo por Plataforma</h2>"

Object.keys(grouped).forEach(platform=>{

  let list = grouped[platform]

  if(list.length === 0) return

  let section = document.createElement("div")
  section.style.marginBottom = "50px"

  section.innerHTML = `
    <h3 style="text-align:center;">${platform}</h3>
  `

  container.appendChild(section)

  let numbers = list.filter(m=>m.type=="number")
  let currency = list.filter(m=>m.type=="currency")
  let percent = list.filter(m=>m.type=="percent")

  function createBlock(title, id, data){
    if(data.length === 0) return

    let block = document.createElement("div")
    block.style.marginBottom = "30px"

    block.innerHTML = `
      <h4 style="text-align:center;">${title}</h4>
      <div class="chart-container">
        <canvas id="${id}"></canvas>
      </div>
    `

    section.appendChild(block)

    createChart(id, data)
  }

  let baseId = platform.replace(/\s/g,'')

  createBlock("Volume", "chart_num_"+baseId, numbers)
  createBlock("Financeiro", "chart_cur_"+baseId, currency)
  createBlock("Percentual", "chart_per_"+baseId, percent)

})

}

const chartColors=["#2563eb","#16a34a","#ea580c","#9333ea","#dc2626","#0891b2","#ca8a04","#4f46e5"]

function createChart(id,data){

let ctx=document.getElementById(id)
if(!ctx)return
if(ctx.chart) ctx.chart.destroy()

let labels=data.map(m=>m.title)
let atual=data.map(m=>parseBrazilNumber(m.atual))
let prev=data.map(m=>parseBrazilNumber(m.anterior))
let colors=labels.map((_,i)=>chartColors[i%chartColors.length])

ctx.chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Período Anterior",data:prev,backgroundColor:"#e5e7eb"},
{label:"Período Atual",data:atual,backgroundColor:colors}
]
},
options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}
})

}

function updateRanking(){

let metrics=getMetrics()
let data=[]

metrics.forEach(m=>{
let atual=parseBrazilNumber(m.atual)
let anterior=parseBrazilNumber(m.anterior)

if(anterior>0){
let change=((atual-anterior)/anterior)*100
data.push({title:m.title,change:change})
}
})

data.sort((a,b)=>b.change-a.change)

let html=""
data.forEach((m,i)=>{
html+=`<div>${i+1}. ${m.title} — ${m.change.toFixed(1)}%</div>`
})

document.getElementById("ranking").innerHTML=html

}


function updateSummary(){

let metrics = getMetrics()

let platforms = {
  "Meta Ads": [],
  "Google Ads": [],
  "Instagram": [],
  "Facebook": [],
  "Outros": []
}

metrics.forEach(m=>{
  let ch = m.channel?.trim() || "Outros"

  if(!platforms[ch]){
    platforms[ch] = []
  }

  platforms[ch].push(m)
})

let html = ""

function generateBlock(title, list){

  if(!list || list.length === 0) return ""

  let positivos = []
  let negativos = []

  list.forEach(m=>{

    let atual = parseBrazilNumber(m.atual)
    let anterior = parseBrazilNumber(m.anterior)

    if(anterior > 0){

      let change = ((atual - anterior) / anterior) * 100

      if(change > 0){
        positivos.push({title:m.title, change})
      } else if(change < 0){
        negativos.push({title:m.title, change})
      }

    }

  })

  positivos.sort((a,b)=>b.change-a.change)
  negativos.sort((a,b)=>a.change-b.change)

  let block = `<div style="margin-bottom:20px">`
  block += `<strong style="font-size:16px">📊 ${title}</strong><br>`

  if(positivos.length > 0){
    block += `<span>📈 <strong>Destaques:</strong></span><br>`
    positivos.slice(0,2).forEach(m=>{
      block += `• ${m.title} cresceu ${m.change.toFixed(1)}%<br>`
    })
  }

  if(negativos.length > 0){
    block += `<span>📉 <strong>Atenção:</strong></span><br>`
    negativos.slice(0,2).forEach(m=>{
      block += `• ${m.title} caiu ${Math.abs(m.change).toFixed(1)}%<br>`
    })
  }

  block += `</div>`

  return block
}


html += generateBlock("Meta Ads", platforms["Meta Ads"])
html += generateBlock("Google Ads", platforms["Google Ads"])
html += generateBlock("Instagram", platforms["Instagram"])
html += generateBlock("Facebook", platforms["Facebook"])
html += generateBlock("Outros", platforms["Outros"])


let summaryEl = document.getElementById("summary")

if(summaryEl){
  summaryEl.innerHTML = html || "Sem dados suficientes para gerar resumo."
}

}

function exportBackup(){

let data={}

for(let i=0;i<localStorage.length;i++){
let key=localStorage.key(i)
data[key]=localStorage.getItem(key)
}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup-relatorios.json"
a.click()

}

function importBackup(event){

let file=event.target.files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

Object.keys(data).forEach(key=>{
localStorage.setItem(key,data[key])
})

alert("Backup importado com sucesso!")
updateClientList()

}

reader.readAsText(file)

}

function saveReport(){

let client=document.getElementById("clientName").innerText.trim()
let period=document.getElementById("period").innerText.trim()

if(!client||!period){
alert("Informe cliente e período")
return
}

let data={
metrics:getMetrics(),
obs:document.getElementById("obs").value,
logoAgency:document.getElementById("logoAgency").src,
logoClient:document.getElementById("logoClient").src
}

localStorage.setItem("report_"+client+"_"+period,JSON.stringify(data))

let clients=JSON.parse(localStorage.getItem("clients")||"[]")

if(!clients.includes(client)){
clients.push(client)
localStorage.setItem("clients",JSON.stringify(clients))
}

updateClientList()
alert("Relatório salvo")

}

function deleteReport(){

let client=document.getElementById("clientSelect").value
let period=document.getElementById("periodSelect").value

if(!client||!period){
alert("Selecione cliente e período")
return
}

let key="report_"+client+"_"+period

if(localStorage.getItem(key)){
localStorage.removeItem(key)
alert("Relatório excluído")
}

updatePeriodList()

}

function deleteClient(){

let client=document.getElementById("clientSelect").value

if(!client){
alert("Selecione um cliente")
return
}

if(!confirm("Excluir TODOS relatórios deste cliente?")) return

for(let key in localStorage){
if(key.startsWith("report_"+client+"_")){
localStorage.removeItem(key)
}
}

let clients=JSON.parse(localStorage.getItem("clients")||"[]")
clients=clients.filter(c=>c!==client)

localStorage.setItem("clients",JSON.stringify(clients))

updateClientList()
document.getElementById("periodSelect").innerHTML='<option>Selecionar Período</option>'

alert("Cliente excluído")

}

function loadReport(){

let client=document.getElementById("clientSelect").value
let period=document.getElementById("periodSelect").value

let data=JSON.parse(localStorage.getItem("report_"+client+"_"+period))

if(!data)return

document.getElementById("clientName").innerText=client
document.getElementById("period").innerText=period

container.innerHTML=""


data.metrics.forEach(m=>{

  if(!m.channel){
    m.channel = "Meta Ads"
  }

  addMetric(m)

})

cleanEmptySections()

document.getElementById("obs").value=data.obs||""
document.getElementById("logoAgency").src=data.logoAgency||""
document.getElementById("logoClient").src=data.logoClient||""

updateCharts()
updateRanking()
updateSummary()

}

function generateNewReport(){

document.querySelectorAll(".metric-card").forEach(card=>{
let atual=card.querySelector(".atual").value
card.querySelector(".anterior").value=atual
card.querySelector(".atual").value=""
calculate(card)
})

alert("Novo relatório iniciado. Atualize o período.")

updateSummary()

}

function updateClientList(){

let clients=JSON.parse(localStorage.getItem("clients")||"[]")

let select=document.getElementById("clientSelect")

select.innerHTML='<option value="">Selecionar Cliente</option>'

clients.forEach(c=>{
select.innerHTML+=`<option value="${c}">${c}</option>`
})

}

function updatePeriodList(){

let client=document.getElementById("clientSelect").value
let select=document.getElementById("periodSelect")

select.innerHTML='<option value="">Selecionar Período</option>'

for(let key in localStorage){
if(key.startsWith("report_"+client+"_")){
let period=key.replace("report_"+client+"_","")
select.innerHTML+=`<option value="${period}">${period}</option>`
}
}

}

function exportPDF(){

  document.getElementById("coverClient").innerText =
    document.getElementById("clientName").innerText

  document.getElementById("coverPeriod").innerText =
    document.getElementById("period").innerText

  let cover = document.getElementById("cover")
  cover.style.display = "block"

  updateCharts()
  updateRanking()
  updateSummary()

  setTimeout(()=>{
    window.print()
    cover.style.display = "none"
  }, 500)

}

document.getElementById("logoAgencyInput").addEventListener("change",e=>{
let r=new FileReader()
r.onload=()=>document.getElementById("logoAgency").src=r.result
r.readAsDataURL(e.target.files[0])
})

document.getElementById("logoClientInput").addEventListener("change",e=>{
let r=new FileReader()
r.onload=()=>document.getElementById("logoClient").src=r.result
r.readAsDataURL(e.target.files[0])
})

updateClientList()

addMetric()
addMetric()
addMetric()

</script>

</body>
</html>
